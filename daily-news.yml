name: Orbital News diaria

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar y publicar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python orbital_news.py

      - name: Commit
        run: |
          git config user.email "bot@orbital-news.space"
          git config user.name "Orbital News Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Edicion $(date '+%d/%m/%Y')"
          git push
